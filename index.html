<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>RioLuquitas</title>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="RioLuquitas"/>
<meta name="mobile-web-app-capable" content="yes"/>
<link rel="apple-touch-icon" href="icon.png"/>
<link rel="icon" type="image/png" href="icon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Nunito:wght@400;500;600;700;800;900&display=swap"/>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  ::-webkit-scrollbar{display:none}
  html,body{width:100%;height:100%;background:#2C1810}
  input,textarea,select,button{outline:none;-webkit-appearance:none;font-family:'Nunito',sans-serif}
  input[type=date]::-webkit-calendar-picker-indicator{opacity:0.4}
  .pr{cursor:pointer;transition:transform .14s,opacity .14s}
  .pr:active{transform:scale(.96);opacity:.85}
  .sho{animation:fadeIn .22s ease}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideUp{from{transform:translateY(22px);opacity:0}to{transform:translateY(0);opacity:1}}
  @keyframes shpIn{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .shp{animation:shpIn .32s cubic-bezier(.32,.72,0,1)}
  .fi{animation:fadeIn .28s ease}
  .card-anim{opacity:0;animation:slideUp .35s ease forwards}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ── Colors ────────────────────────────────────────────────────────────────────
const C = {
  espresso:"#2C1810", dark:"#3D2314", caramel:"#7A4522",
  latte:"#B07848", cream:"#F7EFE5", parchment:"#EFE3D4",
  sage:"#5E8B63", moss:"#3D6645", mint:"#C2D9BE",
  gold:"#C49A4A", white:"#FFFFFF", red:"#C0392B",
  blue:"#3B4A6B", blueLight:"#A8B8D8",
};

// ── Helpers ────────────────────────────────────────────────────────────────────
const toRawNum = (s) => Number(String(s).replace(/\./g,"").replace(/\D/g,"")) || 0;
const fmtInput = (v) => String(v).replace(/\D/g,"").replace(/\B(?=(\d{3})+(?!\d))/g,".");
const fmtCLP   = (n) => new Intl.NumberFormat("es-CL",{style:"currency",currency:"CLP",minimumFractionDigits:0}).format(n);
const fmtDate  = (d) => new Date(d+"T12:00:00").toLocaleDateString("es-CL",{day:"2-digit",month:"short",year:"numeric"});
const fmtDateTime = (ts) => new Date(ts).toLocaleDateString("es-CL",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});
const todayStr = () => new Date().toISOString().slice(0,10);
const getInits = (n) => n.trim().split(/\s+/).slice(0,2).map(w=>w[0]?.toUpperCase()).join("") || "?";

const curMK = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`; };
const prevMKfn = (mk) => {
  const [y,m] = mk.split("-").map(Number);
  const d = new Date(y, m-2, 1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
};
const mkLabel = (k) => {
  if (k==="todo") return "Todo el historial";
  const [y,m] = k.split("-");
  const d = new Date(Number(y),Number(m)-1,1);
  return d.toLocaleDateString("es-CL",{month:"long",year:"numeric"});
};
const mkLabelShort = (k) => {
  if (k==="todo") return "Historial";
  const [y,m] = k.split("-");
  const d = new Date(Number(y),Number(m)-1,1);
  const curYear = new Date().getFullYear();
  const mo = d.toLocaleDateString("es-CL",{month:"short"}).replace(".","");
  return Number(y) !== curYear ? `${mo} ${y}` : mo;
};
const monthStart = (mk) => { const [y,m]=mk.split("-").map(Number); return new Date(y,m-1,1).getTime(); };
const monthEnd   = (mk) => { const [y,m]=mk.split("-").map(Number); return new Date(y,m,0,23,59,59,999).getTime(); };

// Meses que realmente tienen préstamos creados
const loanMonthsWithData = () => {
  const mks = new Set(state.loans.map(l => l.fecha.slice(0,7)));
  return [...mks].sort().reverse();
};
// Meses que realmente tienen gastos
const expMonthsWithData = () => {
  const mks = new Set(state.expenses.map(e => e.fecha.slice(0,7)));
  return [...mks].sort().reverse();
};

const AV_PAL = [[C.espresso,C.gold],[C.moss,C.mint],[C.caramel,C.parchment],[C.blue,C.blueLight],["#6B3B5A","#D8A8C8"]];
const avPal  = (n) => AV_PAL[n.charCodeAt(0) % AV_PAL.length];

const CATS = [
  {id:"comida",    label:"Comida",          icon:"🍽️"},
  {id:"super",     label:"Supermercado",     icon:"🛒"},
  {id:"transporte",label:"Transporte",       icon:"🚌"},
  {id:"salud",     label:"Salud",            icon:"💊"},
  {id:"ropa",      label:"Ropa",             icon:"👗"},
  {id:"entrete",   label:"Entretención",     icon:"🎬"},
  {id:"hogar",     label:"Hogar",            icon:"🏠"},
  {id:"personal",  label:"Cuidado personal", icon:"💅"},
  {id:"otros",     label:"Otros",            icon:"📦"},
];
const catById = (id) => CATS.find(c=>c.id===id) || CATS[CATS.length-1];
const CAT_COLORS = {
  comida:    {bar:"#C17F3A", track:"rgba(193,127,58,.15)"},
  super:     {bar:"#5E8B63", track:"rgba(94,139,99,.15)"},
  transporte:{bar:"#4A7A9B", track:"rgba(74,122,155,.15)"},
  salud:     {bar:"#8B5E8B", track:"rgba(139,94,139,.15)"},
  ropa:      {bar:"#B06070", track:"rgba(176,96,112,.15)"},
  entrete:   {bar:"#7A6BA0", track:"rgba(122,107,160,.15)"},
  hogar:     {bar:"#7A9B5E", track:"rgba(122,155,94,.15)"},
  personal:  {bar:"#B07848", track:"rgba(176,120,72,.15)"},
  otros:     {bar:"#8A8070", track:"rgba(138,128,112,.15)"},
};
const catColor = (id) => CAT_COLORS[id] || CAT_COLORS.otros;
const LEFT_TABS = ["prestamos","resumenPrestamos"];

const lsGet = (k,f) => { try { const v=localStorage.getItem(k); return v?JSON.parse(v):f; } catch { return f; } };
const lsSet = (k,v) => { try { localStorage.setItem(k,JSON.stringify(v)); } catch {} };

// ── State ─────────────────────────────────────────────────────────────────────
let state = {
  loans:     lsGet("prestamos_loans_v2", []),
  expenses:  lsGet("prestamos_expenses_v1", []),
  tab:       "prestamos",
  sheet:     null,
  detailL:   null,
  detailE:   null,
  monthPickerFor: null, // null | "loan" | "expense" | "loanVsA" | "loanVsB" | "expVsA" | "expVsB"
  loanMK:    curMK(),
  expMK:     curMK(),
  loanVsOpen: false,
  loanVsA:   curMK(),
  loanVsB:   prevMKfn(curMK()),
  expVsOpen:  false,
  expVsA:    curMK(),
  expVsB:    prevMKfn(curMK()),
  lF: {nombre:"",montoFmt:"",fecha:todayStr(),nota:""},
  eF: {cat:"comida",montoFmt:"",fecha:todayStr(),desc:""},
};

let lFbuf = {...state.lF};
let eFbuf = {...state.eF};

function setState(patch) {
  state = {...state,...patch};
  if (patch.sheet !== undefined) {
    lFbuf = {...state.lF};
    eFbuf = {...state.eF};
  }
  if (patch.loans    !== undefined) lsSet("prestamos_loans_v2",    state.loans);
  if (patch.expenses !== undefined) lsSet("prestamos_expenses_v1", state.expenses);
  render();
}

// ── Derived ────────────────────────────────────────────────────────────────────
// Un préstamo aparece en un mes si fue creado en ese mes o antes, Y sigue
// pendiente O fue cobrado en ese mes o después (carry-forward automático)
function loansCreatedInMonth(mk) {
  if (mk === "todo") return state.loans;
  const ms = monthStart(mk), me = monthEnd(mk);
  return state.loans.filter(l => {
    const created = new Date(l.fecha + "T00:00:00").getTime();
    if (created > me) return false;    // creado después de este mes, no aparece
    if (!l.pagado) return true;        // pendiente: aparece en este y todos los meses siguientes
    return l.pagadoEn >= ms;           // cobrado: solo aparece hasta el mes en que se cobró
  });
}

// ── Actions ────────────────────────────────────────────────────────────────────
function addLoan() {
  const f = lFbuf;
  const monto = toRawNum(f.montoFmt);
  if (!f.nombre.trim()||!monto||!f.fecha) return;
  setState({
    loans: [{id:Date.now(),nombre:f.nombre.trim(),monto,fecha:f.fecha,nota:f.nota,pagado:false,pagadoEn:null},...state.loans],
    sheet: null,
    lF: {nombre:"",montoFmt:"",fecha:todayStr(),nota:""},
  });
}
function togglePagado(id) {
  setState({loans: state.loans.map(l=>
    l.id===id ? {...l, pagado:!l.pagado, pagadoEn:!l.pagado?Date.now():null} : l
  )});
}
function deleteLoan(id) {
  setState({loans: state.loans.filter(l=>l.id!==id), detailL:null});
}
function addExpense() {
  const f = eFbuf;
  const monto = toRawNum(f.montoFmt);
  if (!monto||!f.fecha||!f.desc.trim()) return;
  setState({
    expenses: [{id:Date.now(),cat:f.cat,monto,fecha:f.fecha,desc:f.desc.trim()},...state.expenses],
    sheet: null,
    eF: {cat:"comida",montoFmt:"",fecha:todayStr(),desc:""},
  });
}
function deleteExpense(id) {
  setState({expenses: state.expenses.filter(e=>e.id!==id), detailE:null});
}
function openSheet(type) {
  setState({
    sheet: type,
    lF: type==="loan"    ? {nombre:"",montoFmt:"",fecha:todayStr(),nota:""}  : state.lF,
    eF: type==="expense" ? {cat:"comida",montoFmt:"",fecha:todayStr(),desc:""} : state.eF,
  });
}

// ── DOM helper ────────────────────────────────────────────────────────────────
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) {
    for (const [k,v] of Object.entries(attrs)) {
      if (k === "style" && typeof v === "object") { Object.assign(el.style, v); }
      else if (k === "className") { el.className = v; }
      else if (k.startsWith("on") && typeof v === "function") {
        el.addEventListener(k.slice(2), v);
      } else if (k === "htmlFor") { el.htmlFor = v; }
      else if (k === "inputMode") { el.setAttribute("inputmode",v); }
      else if (k === "value" && (tag==="input"||tag==="textarea"||tag==="select")) {
        el.value = v;
      }
      else if (k !== "value") { el.setAttribute(k,v); }
    }
  }
  for (const c of children.flat(Infinity)) {
    if (c == null || c === false) continue;
    el.appendChild(typeof c === "string" || typeof c === "number" ? document.createTextNode(String(c)) : c);
  }
  return el;
}

const bInputStyle = {width:"100%",background:C.white,border:"1.5px solid rgba(122,69,34,.15)",borderRadius:"14px",padding:"13px 14px",fontSize:"15px",color:C.dark,fontFamily:"'Nunito',sans-serif",fontWeight:"500"};

function renderAvatar(name, size) {
  const [bg,fg] = avPal(name);
  return h("div",{style:{width:size+"px",height:size+"px",borderRadius:"50%",background:`linear-gradient(135deg,${bg},${fg})`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:"0"}},
    h("span",{style:{color:C.white,fontSize:(size*0.36)+"px",fontWeight:"900"}}, getInits(name))
  );
}

function renderDeco() {
  return [
    h("div",{style:{position:"absolute",top:"-40px",right:"-40px",width:"160px",height:"160px",borderRadius:"50%",background:"rgba(255,255,255,.07)",pointerEvents:"none"}}),
    h("div",{style:{position:"absolute",bottom:"0",left:"-30px",width:"100px",height:"100px",borderRadius:"50%",background:"rgba(255,255,255,.04)",pointerEvents:"none"}}),
  ];
}

function renderMiniStat(l,v,e) {
  return h("div",{style:{flex:"1",background:"rgba(255,255,255,.1)",borderRadius:"14px",padding:"10px 10px 8px",backdropFilter:"blur(10px)",border:"1px solid rgba(255,255,255,.12)"}},
    h("div",{style:{fontSize:"15px",marginBottom:"2px"}}, e),
    h("div",{style:{color:C.white,fontSize:"13px",fontWeight:"800",lineHeight:"1.2"}}, String(v)),
    h("div",{style:{color:"rgba(255,255,255,.42)",fontSize:"10px",fontWeight:"700",marginTop:"2px",letterSpacing:"0.4px",textTransform:"uppercase"}}, l)
  );
}

// ── Pill selector de mes (dentro del header) ──────────────────────────────────
function renderMonthPill(mk, pickerId, isCur) {
  return h("button",{
    className:"pr",
    style:{flexShrink:"0",background:"rgba(255,255,255,.18)",border:"1.5px solid rgba(255,255,255,.28)",borderRadius:"20px",padding:"7px 14px",color:C.white,fontSize:"13px",fontWeight:"800",fontFamily:"'Nunito',sans-serif",cursor:"pointer",display:"flex",alignItems:"center",gap:"6px",backdropFilter:"blur(8px)"},
    onclick:()=>setState({monthPickerFor:pickerId})},
    h("span",{style:{fontSize:"13px"}}, "📅"),
    h("span",{style:{textTransform:"capitalize"}}, mkLabelShort(mk)+(isCur&&mk!=="todo"?" ✦":""))
  );
}

// ── Headers ───────────────────────────────────────────────────────────────────
function renderLoanHeader() {
  const { loanMK } = state;
  const loans = loansCreatedInMonth(loanMK);
  const pendientes  = loans.filter(l=>!l.pagado);
  const cobrados    = loans.filter(l=>l.pagado);
  const totalPend   = pendientes.reduce((s,l)=>s+l.monto,0);
  const totalCob    = cobrados.reduce((s,l)=>s+l.monto,0);
  const isCur = loanMK === curMK();

  return h("div",{style:{background:`linear-gradient(155deg,${C.espresso} 0%,${C.caramel} 100%)`,padding:"18px 20px 20px",position:"relative",overflow:"hidden",flexShrink:"0"}},
    ...renderDeco(),
    h("div",{style:{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:"10px"}},
      h("p",{style:{color:"rgba(255,255,255,.5)",fontSize:"12px",fontFamily:"'Cormorant Garamond',serif",letterSpacing:"2px",textTransform:"uppercase",margin:"0",paddingTop:"4px"}}, "Mis Préstamos"),
      h("div",{style:{display:"flex",gap:"8px",alignItems:"center"}},
        renderMonthPill(loanMK,"loan",isCur),
        h("button",{className:"pr",style:{flexShrink:"0",background:"rgba(255,255,255,.15)",border:"1.5px solid rgba(255,255,255,.28)",borderRadius:"20px",padding:"7px 12px",color:C.white,fontSize:"13px",fontWeight:"800",fontFamily:"'Nunito',sans-serif",cursor:"pointer",backdropFilter:"blur(8px)"},onclick:()=>setState({sheet:"data"})}, "📤")
      )
    ),
    h("h1",{style:{color:C.white,fontSize:"38px",fontFamily:"'Cormorant Garamond',serif",fontWeight:"700",margin:"0",lineHeight:"1"}}, fmtCLP(totalPend)),
    h("p",{style:{color:"rgba(255,255,255,.45)",fontSize:"11px",fontWeight:"700",margin:"4px 0 14px",letterSpacing:"0.8px"}}, "PENDIENTE DE COBRO"),
    h("div",{style:{display:"flex",gap:"10px"}},
      renderMiniStat("Pendientes", pendientes.length, "⏳"),
      renderMiniStat("Cobrado", fmtCLP(totalCob), "✅"),
      renderMiniStat("Registros", loans.length, "📋")
    )
  );
}

function renderExpenseHeader() {
  const { expMK } = state;
  const thisMon = expMK==="todo" ? state.expenses : state.expenses.filter(e=>e.fecha.startsWith(expMK));
  const totalMes = thisMon.reduce((s,e)=>s+e.monto,0);
  const isCur = expMK === curMK();

  return h("div",{style:{background:`linear-gradient(155deg,${C.moss} 0%,${C.sage} 100%)`,padding:"18px 20px 20px",position:"relative",overflow:"hidden",flexShrink:"0"}},
    ...renderDeco(),
    h("div",{style:{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:"10px"}},
      h("p",{style:{color:"rgba(255,255,255,.5)",fontSize:"12px",fontFamily:"'Cormorant Garamond',serif",letterSpacing:"2px",textTransform:"uppercase",margin:"0",paddingTop:"4px"}}, "Mis Gastos"),
      h("div",{style:{display:"flex",gap:"8px",alignItems:"center"}},
        renderMonthPill(expMK,"expense",isCur),
        h("button",{className:"pr",style:{flexShrink:"0",background:"rgba(255,255,255,.15)",border:"1.5px solid rgba(255,255,255,.28)",borderRadius:"20px",padding:"7px 12px",color:C.white,fontSize:"13px",fontWeight:"800",fontFamily:"'Nunito',sans-serif",cursor:"pointer",backdropFilter:"blur(8px)"},onclick:()=>setState({sheet:"data"})}, "📤")
      )
    ),
    h("h1",{style:{color:C.white,fontSize:"38px",fontFamily:"'Cormorant Garamond',serif",fontWeight:"700",margin:"0",lineHeight:"1"}}, fmtCLP(totalMes)),
    h("p",{style:{color:"rgba(255,255,255,.45)",fontSize:"11px",fontWeight:"700",margin:"4px 0 14px",letterSpacing:"0.8px",textTransform:"uppercase"}},
      expMK==="todo"?"HISTORIAL COMPLETO":mkLabel(expMK).toUpperCase()),
    h("div",{style:{display:"flex",gap:"10px"}},
      renderMiniStat("Total período", fmtCLP(totalMes), "💳"),
      renderMiniStat("Registros", thisMon.length, "📋"),
      renderMiniStat("Mayor gasto", thisMon.length?fmtCLP([...thisMon].sort((a,b)=>b.monto-a.monto)[0].monto):"—", "🔝")
    )
  );
}

// ── Componentes comunes ───────────────────────────────────────────────────────
function renderSecHead(title, count, color) {
  return h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"10px",marginTop:"4px"}},
    h("p",{style:{margin:"0",fontFamily:"'Cormorant Garamond',serif",fontSize:"20px",fontWeight:"700",color:C.dark}}, title),
    h("span",{style:{background:color,color:C.white,borderRadius:"20px",padding:"2px 10px",fontSize:"11px",fontWeight:"800"}}, String(count))
  );
}

function renderLoanCard(loan, idx, paid) {
  return h("div",{className:"pr card-anim",
    style:{background:C.white,borderRadius:"18px",padding:"13px 15px",marginBottom:"10px",display:"flex",alignItems:"center",gap:"13px",boxShadow:"0 2px 12px rgba(44,24,16,.07)",opacity:paid?"0.65":"1",borderLeft:`3px solid ${paid?C.sage:C.caramel}`,animationDelay:`${idx*0.06}s`},
    onclick:()=>setState({detailL:loan})},
    renderAvatar(loan.nombre, 44),
    h("div",{style:{flex:"1",minWidth:"0"}},
      h("p",{style:{margin:"0",fontWeight:"700",fontSize:"15px",color:C.dark,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}, loan.nombre),
      h("p",{style:{margin:"2px 0 0",fontSize:"12px",color:"#bbb"}}, fmtDate(loan.fecha)),
      ...(loan.nota ? [h("p",{style:{margin:"1px 0 0",fontSize:"12px",color:"#ccc",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}, loan.nota)] : [])
    ),
    h("div",{style:{textAlign:"right",flexShrink:"0"}},
      h("p",{style:{margin:"0",fontWeight:"800",fontSize:"15px",color:paid?C.sage:C.caramel,fontFamily:"'Cormorant Garamond',serif"}}, fmtCLP(loan.monto)),
      h("span",{style:{fontSize:"9px",fontWeight:"800",background:paid?"rgba(94,139,99,.12)":"rgba(122,69,34,.1)",color:paid?C.sage:C.caramel,borderRadius:"8px",padding:"2px 6px"}}, paid?"COBRADO":"PENDIENTE")
    )
  );
}

function renderExpCard(exp, idx) {
  const cat = catById(exp.cat);
  return h("div",{className:"pr card-anim",
    style:{background:C.white,borderRadius:"18px",padding:"13px 15px",marginBottom:"10px",display:"flex",alignItems:"center",gap:"13px",boxShadow:"0 2px 12px rgba(44,24,16,.07)",borderLeft:`3px solid ${C.sage}`,animationDelay:`${idx*0.06}s`},
    onclick:()=>setState({detailE:exp})},
    h("div",{style:{width:"44px",height:"44px",borderRadius:"14px",background:`linear-gradient(135deg,${C.moss},${C.sage})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px",flexShrink:"0"}}, cat.icon),
    h("div",{style:{flex:"1",minWidth:"0"}},
      h("p",{style:{margin:"0",fontWeight:"700",fontSize:"15px",color:C.dark,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}, exp.desc),
      h("p",{style:{margin:"2px 0 0",fontSize:"12px",color:"#bbb"}}, cat.icon+" "+cat.label+" · "+fmtDate(exp.fecha))
    ),
    h("p",{style:{margin:"0",fontWeight:"800",fontSize:"15px",color:C.sage,fontFamily:"'Cormorant Garamond',serif",flexShrink:"0"}}, fmtCLP(exp.monto))
  );
}

function renderCatBar(cat, total) {
  const pct = total ? Math.round(cat.total/total*100) : 0;
  const cc = catColor(cat.id);
  return h("div",{style:{marginBottom:"10px"}},
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"4px"}},
      h("span",{style:{fontSize:"13px",fontWeight:"600",color:C.dark}}, cat.icon+" "+cat.label),
      h("span",{style:{fontSize:"13px",fontWeight:"700",color:cc.bar}}, fmtCLP(cat.total))
    ),
    h("div",{style:{height:"6px",borderRadius:"3px",background:cc.track,overflow:"hidden"}},
      h("div",{style:{height:"100%",width:pct+"%",background:cc.bar,borderRadius:"3px",transition:"width .6s ease"}})
    ),
    h("p",{style:{margin:"2px 0 0",fontSize:"10px",color:"#aaa",textAlign:"right"}}, pct+"%")
  );
}

function renderCatBarDetailed(cat, total) {
  const pct  = total ? Math.round(cat.curr/total*100) : 0;
  const cc = catColor(cat.id);
  return h("div",{style:{marginBottom:"14px"}},
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"5px"}},
      h("div",{style:{display:"flex",alignItems:"center",gap:"8px"}},
        h("div",{style:{width:"34px",height:"34px",borderRadius:"10px",background:cc.track,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"17px"}}, cat.icon),
        h("span",{style:{fontSize:"14px",fontWeight:"600",color:C.dark}}, cat.label)
      ),

// ── Sheet ─────────────────────────────────────────────────────────────────────
function renderSheet(title, onClose, ...children) {
  let startY=null,isDragging=false,closed=false;
  const overlay=document.createElement("div");
  overlay.className="sho";
  overlay.setAttribute("data-overlay","1");
  Object.assign(overlay.style,{position:"fixed",inset:"0",background:"rgba(0,0,0,0.52)",zIndex:"100",display:"flex",flexDirection:"column",justifyContent:"flex-end"});
  const panel=document.createElement("div");
  panel.className="shp";
  Object.assign(panel.style,{background:C.cream,borderRadius:"28px 28px 0 0",padding:"0 20px 44px",maxHeight:"88svh",overflowY:"auto",willChange:"transform",flexShrink:"0"});
  const handle=document.createElement("div");
  Object.assign(handle.style,{padding:"14px 0 10px",cursor:"grab",textAlign:"center",userSelect:"none",WebkitUserSelect:"none"});
  const pill=document.createElement("div");
  Object.assign(pill.style,{display:"inline-block",width:"40px",height:"4px",borderRadius:"2px",background:"rgba(0,0,0,.18)",transition:"background .15s,width .15s"});
  handle.appendChild(pill); panel.appendChild(handle);
  const titleEl=document.createElement("p");
  Object.assign(titleEl.style,{fontFamily:"'Cormorant Garamond',serif",fontSize:"26px",fontWeight:"700",color:C.dark,margin:"0 0 18px"});
  titleEl.textContent=title; panel.appendChild(titleEl);
  children.forEach(c=>{if(c)panel.appendChild(c);});
  overlay.appendChild(panel);

  function closeWithAnim(){
    if(closed)return; closed=true;
    overlay.removeAttribute("data-overlay"); // no re-adjuntar durante animacion
    panel.style.transition="transform .28s cubic-bezier(.32,.72,0,1)";
    overlay.style.transition="opacity .28s";
    panel.style.transform="translateY(110%)";
    overlay.style.opacity="0";
    setTimeout(()=>{if(overlay.parentNode)overlay.parentNode.removeChild(overlay);onClose();},260);
  }
  function onDragStart(cy){startY=cy;isDragging=true;panel.style.transition="none";overlay.style.transition="none";pill.style.background="rgba(0,0,0,.35)";pill.style.width="52px";handle.style.cursor="grabbing";}
  function onDragMove(cy){
    if(!isDragging||startY===null)return;
    const d=cy-startY; if(d<=0)return;
    const r=d>120?120+(d-120)*.35:d;
    panel.style.transform=`translateY(${r}px)`;
    overlay.style.background=`rgba(0,0,0,${Math.max(0,.52-r/350).toFixed(3)})`;
  }
  function onDragEnd(cy){
    if(!isDragging)return; isDragging=false;
    const d=cy-(startY||0); startY=null;
    pill.style.background="rgba(0,0,0,.18)"; pill.style.width="40px"; handle.style.cursor="grab";
    if(d>90){closeWithAnim();}
    else{panel.style.transition="transform .4s cubic-bezier(.175,.885,.32,1.275)";overlay.style.transition="background .3s";panel.style.transform="translateY(0)";overlay.style.background="rgba(0,0,0,0.52)";}
  }
  panel.addEventListener("touchstart",e=>{if(panel.scrollTop>2&&!handle.contains(e.target))return;onDragStart(e.touches[0].clientY);},{passive:true});
  panel.addEventListener("touchmove",e=>{onDragMove(e.touches[0].clientY);},{passive:true});
  panel.addEventListener("touchend",e=>{onDragEnd(e.changedTouches[0].clientY);},{passive:true});
  handle.addEventListener("mousedown",e=>{
    e.preventDefault(); onDragStart(e.clientY);
    const mv=e2=>onDragMove(e2.clientY);
    const up=e2=>{onDragEnd(e2.clientY);document.removeEventListener("mousemove",mv);document.removeEventListener("mouseup",up);};
    document.addEventListener("mousemove",mv); document.addEventListener("mouseup",up);
  });
  overlay.addEventListener("click",e=>{if(e.target===overlay)closeWithAnim();});
  return overlay;
}

          h("p",{style:{margin:"4px 0 0",fontSize:"17px",fontWeight:"800",color:"#FFA07A",fontFamily:"'Cormorant Garamond',serif"}},fmtCLP(totalPend)),
          h("p",{style:{margin:"2px 0 0",fontSize:"10px",color:"rgba(255,255,255,.4)"}},pend.length+" préstamo"+(pend.length!==1?"s":""))

// ── Panel VS Préstamos ────────────────────────────────────────────────────────
function renderLoanVsPanel(mkA, mkB) {
  const loansA = loansCreatedInMonth(mkA);
  const loansB = loansCreatedInMonth(mkB);
  const tA=loansA.reduce((s,l)=>s+l.monto,0);
  const tB=loansB.reduce((s,l)=>s+l.monto,0);
  const cobA=loansA.filter(l=>l.pagado).reduce((s,l)=>s+l.monto,0);
  const cobB=loansB.filter(l=>l.pagado).reduce((s,l)=>s+l.monto,0);
  const pendA=loansA.filter(l=>!l.pagado).reduce((s,l)=>s+l.monto,0);
  const pendB=loansB.filter(l=>!l.pagado).reduce((s,l)=>s+l.monto,0);
  const diff=tA-tB;
  const pct=tB>0?Math.round(Math.abs(diff)/tB*100):null;
  const up=diff>0;

  const wrap=document.createElement("div");

  // Selector meses
  wrap.appendChild(
    h("div",{style:{display:"flex",gap:"10px",marginBottom:"16px",alignItems:"center"}},
      h("button",{className:"pr",style:{flex:"1",background:`linear-gradient(135deg,${C.caramel},${C.espresso})`,border:"none",borderRadius:"16px",padding:"12px 10px",cursor:"pointer",textAlign:"center"},onclick:()=>setState({monthPickerFor:"loanVsA"})},

        h("p",{style:{margin:"3px 0 0",fontSize:"18px",fontWeight:"800",color:C.white,textTransform:"capitalize",fontFamily:"'Cormorant Garamond',serif"}},mkLabelShort(mkA)),
        h("p",{style:{margin:"2px 0 0",fontSize:"11px",color:"rgba(255,255,255,.5)"}},"tap para cambiar")
      ),
      h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:"4px",flexShrink:"0",minWidth:"44px"}},
        h("span",{style:{fontSize:"24px",fontWeight:"900",color:diff===0?"#bbb":up?C.red:C.sage}},diff===0?"═":up?"↑":"↓"),
        ...(pct!=null?[h("span",{style:{fontSize:"11px",fontWeight:"800",color:diff===0?"#bbb":up?C.red:C.sage}},pct+"%")]:[] )
      ),
      h("button",{className:"pr",style:{flex:"1",background:`linear-gradient(135deg,rgba(122,69,34,.35),rgba(44,24,16,.45))`,border:"none",borderRadius:"16px",padding:"12px 10px",cursor:"pointer",textAlign:"center"},onclick:()=>setState({monthPickerFor:"loanVsB"})},

        h("p",{style:{margin:"3px 0 0",fontSize:"18px",fontWeight:"800",color:C.white,textTransform:"capitalize",fontFamily:"'Cormorant Garamond',serif"}},mkLabelShort(mkB)),
        h("p",{style:{margin:"2px 0 0",fontSize:"11px",color:"rgba(255,255,255,.5)"}},"tap para cambiar")
      )

  const rows=[
    {label:"Total prestado",valA:fmtCLP(tA),valB:fmtCLP(tB),diffVal:tA-tB,icon:"💸"},
    {label:"Cobrado",valA:fmtCLP(cobA),valB:fmtCLP(cobB),diffVal:cobA-cobB,icon:"✅"},
    {label:"Pendiente",valA:fmtCLP(pendA),valB:fmtCLP(pendB),diffVal:pendA-pendB,icon:"⏳"},
    {label:"N° préstamos",valA:String(loansA.length),valB:String(loansB.length),diffVal:loansA.length-loansB.length,icon:"📋"},
    {label:"Tasa cobro",valA:loansA.length?Math.round(loansA.filter(l=>l.pagado).length/loansA.length*100)+"%":"—",valB:loansB.length?Math.round(loansB.filter(l=>l.pagado).length/loansB.length*100)+"%":"—",diffVal:null,icon:"🎯"},
  ];

  const tbl=h("div",{style:{background:C.white,borderRadius:"20px",overflow:"hidden",boxShadow:"0 4px 20px rgba(44,24,16,.08)",marginBottom:"14px"}});
  tbl.appendChild(
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",background:`linear-gradient(135deg,${C.espresso},${C.caramel})`,padding:"10px 16px"}},
      h("p",{style:{margin:"0",fontSize:"11px",fontWeight:"800",color:"rgba(255,255,255,.5)",letterSpacing:"0.5px"}},"MÉTRICA"),

    tbl.appendChild(

  // Conclusión

    :`En ${mkLabel(mkA)} prestaste ${fmtCLP(Math.abs(diff))} ${up?"más":"menos"} que en ${mkLabel(mkB)}${pct!=null?" ("+pct+"%)":""}. ${up?"Más préstamos que el período anterior 🔴":"Menos préstamos que el período anterior 🟢"}`;

// ── Panel VS Gastos ───────────────────────────────────────────────────────────
function renderExpVsPanel(mkA, mkB) {
  const listA=mkA==="todo"?state.expenses:state.expenses.filter(e=>e.fecha.startsWith(mkA));
  const listB=mkB==="todo"?state.expenses:state.expenses.filter(e=>e.fecha.startsWith(mkB));
  const tA=listA.reduce((s,e)=>s+e.monto,0);
  const tB=listB.reduce((s,e)=>s+e.monto,0);
  const diff=tA-tB; const pct=tB>0?Math.round(Math.abs(diff)/tB*100):null; const up=diff>0;

  const wrap=document.createElement("div");

  // Selector meses
  wrap.appendChild(
    h("div",{style:{display:"flex",gap:"10px",marginBottom:"16px",alignItems:"center"}},
      h("button",{className:"pr",style:{flex:"1",background:`linear-gradient(135deg,${C.sage},${C.moss})`,border:"none",borderRadius:"16px",padding:"12px 10px",cursor:"pointer",textAlign:"center"},onclick:()=>setState({monthPickerFor:"expVsA"})},
        h("p",{style:{margin:"0",fontSize:"10px",fontWeight:"800",color:"rgba(255,255,255,.6)",letterSpacing:"0.5px"}},"MES A"),
        h("p",{style:{margin:"3px 0 0",fontSize:"18px",fontWeight:"800",color:C.white,textTransform:"capitalize",fontFamily:"'Cormorant Garamond',serif"}},mkLabelShort(mkA)),
        h("p",{style:{margin:"2px 0 0",fontSize:"11px",color:"rgba(255,255,255,.5)"}},"tap para cambiar")
      ),
      h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:"4px",flexShrink:"0",minWidth:"44px"}},
        h("span",{style:{fontSize:"24px",fontWeight:"900",color:diff===0?"#bbb":up?C.red:C.sage}},diff===0?"═":up?"↑":"↓"),
        ...(pct!=null?[h("span",{style:{fontSize:"11px",fontWeight:"800",color:diff===0?"#bbb":up?C.red:C.sage}},pct+"%")]:[] )
      ),
      h("button",{className:"pr",style:{flex:"1",background:`linear-gradient(135deg,rgba(61,100,69,.45),rgba(30,70,42,.55))`,border:"none",borderRadius:"16px",padding:"12px 10px",cursor:"pointer",textAlign:"center"},onclick:()=>setState({monthPickerFor:"expVsB"})},
        h("p",{style:{margin:"0",fontSize:"10px",fontWeight:"800",color:"rgba(255,255,255,.6)",letterSpacing:"0.5px"}},"MES B"),
        h("p",{style:{margin:"3px 0 0",fontSize:"18px",fontWeight:"800",color:C.white,textTransform:"capitalize",fontFamily:"'Cormorant Garamond',serif"}},mkLabelShort(mkB)),
        h("p",{style:{margin:"2px 0 0",fontSize:"11px",color:"rgba(255,255,255,.5)"}},"tap para cambiar")
      )
    )
  );

  // Tabla
  const catRows=CATS.map(c=>({...c,va:listA.filter(e=>e.cat===c.id).reduce((s,e)=>s+e.monto,0),vb:listB.filter(e=>e.cat===c.id).reduce((s,e)=>s+e.monto,0)})).filter(c=>c.va>0||c.vb>0);
  const mainRows=[
    {label:"Total gastado",valA:fmtCLP(tA),valB:fmtCLP(tB),diffVal:tA-tB,icon:"💳"},
    {label:"N° registros",valA:String(listA.length),valB:String(listB.length),diffVal:listA.length-listB.length,icon:"📋"},
    {label:"Promedio",valA:fmtCLP(listA.length?Math.round(tA/listA.length):0),valB:fmtCLP(listB.length?Math.round(tB/listB.length):0),diffVal:(listA.length?Math.round(tA/listA.length):0)-(listB.length?Math.round(tB/listB.length):0),icon:"📊"},
  ];

  const tbl=h("div",{style:{background:C.white,borderRadius:"20px",overflow:"hidden",boxShadow:"0 4px 20px rgba(44,24,16,.08)",marginBottom:"12px"}});
  tbl.appendChild(
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",background:`linear-gradient(135deg,${C.moss},${C.sage})`,padding:"10px 16px"}},
      h("p",{style:{margin:"0",fontSize:"11px",fontWeight:"800",color:"rgba(255,255,255,.5)",letterSpacing:"0.5px"}},"MÉTRICA"),
      h("p",{style:{margin:"0",fontSize:"11px",fontWeight:"800",color:"rgba(255,255,255,.9)",textAlign:"center",letterSpacing:"0.5px"}},mkLabelShort(mkA).toUpperCase()),
      h("p",{style:{margin:"0",fontSize:"11px",fontWeight:"800",color:"rgba(255,255,255,.5)",textAlign:"center",letterSpacing:"0.5px"}},mkLabelShort(mkB).toUpperCase())
    )
  );
  mainRows.forEach((r,i)=>{
    const dv=r.diffVal;
    const diffColor=dv===0?"#ccc":dv>0?C.red:C.sage;
    tbl.appendChild(
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",padding:"12px 16px",background:i%2===0?C.white:"rgba(0,0,0,.02)",borderTop:"1px solid rgba(0,0,0,.05)"}},
        h("div",{style:{display:"flex",alignItems:"center",gap:"6px"}},
          h("span",{style:{fontSize:"14px"}},r.icon),
          h("span",{style:{fontSize:"12px",fontWeight:"600",color:C.dark}},r.label)
        ),
        h("p",{style:{margin:"0",fontSize:"14px",fontWeight:"800",color:C.sage,textAlign:"center",fontFamily:"'Cormorant Garamond',serif"}},r.valA),
        h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center"}},
          h("p",{style:{margin:"0",fontSize:"14px",fontWeight:"700",color:C.dark,textAlign:"center",fontFamily:"'Cormorant Garamond',serif"}},r.valB),
          ...(dv!==0?[h("span",{style:{fontSize:"10px",fontWeight:"800",color:diffColor}},(dv>0?"↑ +":"↓ ")+fmtCLP(Math.abs(dv)))]:[] )
        )
      )
    );
  });
  wrap.appendChild(tbl);

  // Por categoría
  if (catRows.length>0) {
    wrap.appendChild(h("p",{style:{fontFamily:"'Cormorant Garamond',serif",fontSize:"17px",fontWeight:"700",color:C.dark,margin:"4px 0 10px"}},"Por categoría"));
    const catBox=h("div",{style:{background:C.white,borderRadius:"18px",padding:"14px 16px",boxShadow:"0 2px 14px rgba(44,24,16,.08)",marginBottom:"12px"}});
    catRows.forEach(c=>{
      const dv=c.va-c.vb;
      const dc=dv===0?"#ccc":dv>0?C.red:C.sage;
      catBox.appendChild(
        h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid rgba(0,0,0,.04)"}},
          h("div",{style:{display:"flex",alignItems:"center",gap:"8px"}},
            h("span",{style:{fontSize:"16px"}},c.icon),
            h("span",{style:{fontSize:"13px",fontWeight:"600",color:C.dark}},c.label)
          ),
          h("div",{style:{textAlign:"right"}},
            h("p",{style:{margin:"0",fontSize:"13px",fontWeight:"800",color:C.sage,fontFamily:"'Cormorant Garamond',serif"}},fmtCLP(c.va)),
            h("p",{style:{margin:"0",fontSize:"11px",fontWeight:"600",color:"#bbb"}},fmtCLP(c.vb)+" anterior"),
            ...(dv!==0?[h("p",{style:{margin:"0",fontSize:"10px",fontWeight:"800",color:dc}},(dv>0?"↑ +":"↓ ")+fmtCLP(Math.abs(dv)))]:[] )
          )
        )
      );
    });
    wrap.appendChild(catBox);
  }

  const txt=diff===0?"Ambos períodos tuvieron el mismo gasto."
    :`En ${mkLabel(mkA)} gastaste ${fmtCLP(Math.abs(diff))} ${up?"más":"menos"} que en ${mkLabel(mkB)}${pct!=null?" ("+pct+"%)":""}. ${up?"¡Atención con el aumento! 🔴":"¡Menos gastos este período! 🟢"}`;
  wrap.appendChild(
    h("div",{style:{background:`linear-gradient(135deg,rgba(61,100,69,.07),rgba(61,100,69,.03))`,borderRadius:"16px",padding:"14px 16px",border:`1px solid rgba(61,100,69,.15)`}},
      h("p",{style:{margin:"0",fontSize:"13px",fontWeight:"600",color:C.dark,lineHeight:"1.6"}},
        h("span",{style:{fontSize:"16px",marginRight:"6px"}},"💬"), txt)
    )
  );
  return wrap;
}

// ── Sheet Selector de Mes ─────────────────────────────────────────────────────
function renderMonthPickerSheet() {
  const { monthPickerFor, loanMK, expMK, loanVsA, loanVsB, expVsA, expVsB } = state;
  if (!monthPickerFor) return null;

  const isLoan = ["loan","loanVsA","loanVsB"].includes(monthPickerFor);
  const isVs   = ["loanVsA","loanVsB","expVsA","expVsB"].includes(monthPickerFor);
  const accent  = isLoan ? C.caramel : C.sage;
  const accentD = isLoan ? C.espresso : C.moss;

  // Solo meses con datos reales
  const rawMonths = isLoan ? loanMonthsWithData() : expMonthsWithData();
  const months = rawMonths.length > 0 ? rawMonths : [curMK()];

  const selMK = monthPickerFor==="loan" ? loanMK
    : monthPickerFor==="expense" ? expMK
    : monthPickerFor==="loanVsA" ? loanVsA
    : monthPickerFor==="loanVsB" ? loanVsB
    : monthPickerFor==="expVsA"  ? expVsA : expVsB;

  const onSelect = (mk) => {
    if (monthPickerFor==="loan")     setState({loanMK:mk,monthPickerFor:null});
    else if (monthPickerFor==="expense") setState({expMK:mk,monthPickerFor:null});
    else if (monthPickerFor==="loanVsA") setState({loanVsA:mk,monthPickerFor:null});
    else if (monthPickerFor==="loanVsB") setState({loanVsB:mk,monthPickerFor:null});
    else if (monthPickerFor==="expVsA")  setState({expVsA:mk,monthPickerFor:null});
    else setState({expVsB:mk,monthPickerFor:null});
  };

  const buttons=[];

  // Opción "Todo el historial" solo para vistas principales (no VS)
  if (!isVs) {
    const isTodo = selMK==="todo";
    buttons.push(
      h("button",{style:{background:isTodo?`linear-gradient(135deg,${accent},${accentD})`:C.white,border:isTodo?"none":"1.5px solid rgba(0,0,0,.07)",borderRadius:"16px",padding:"14px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer",boxShadow:isTodo?`0 4px 14px ${accent}44`:"0 1px 4px rgba(0,0,0,.05)",width:"100%"},onclick:()=>onSelect("todo")},
        h("div",{style:{display:"flex",alignItems:"center",gap:"10px"}},
          h("span",{style:{fontSize:"20px"}},"🌐"),
          h("div",{},
            h("p",{style:{margin:"0",fontSize:"16px",fontWeight:"700",fontFamily:"'Cormorant Garamond',serif",color:isTodo?C.white:C.dark}},"Todo el historial"),
            h("p",{style:{margin:"2px 0 0",fontSize:"11px",color:isTodo?"rgba(255,255,255,.6)":"#bbb",fontWeight:"600"}},"Ver todos los registros")
          )
        ),
        ...(isTodo?[h("span",{style:{color:C.white,fontSize:"18px"}},"✓")]:[] )
      )
    );
  }

  // Agrupar por año — colapsable
  const byYear = {};
  months.forEach(mk => {
    const yr = mk.slice(0,4);
    if (!byYear[yr]) byYear[yr] = [];
    byYear[yr].push(mk);
  });
  const years = Object.keys(byYear).sort().reverse();
  // El año abierto por defecto: el año del mes seleccionado
  const selYear = selMK==="todo" ? years[0] : selMK.slice(0,4);
  const openYears = {[selYear]: true};

  years.forEach(yr => {
    const isOpen = !!openYears[yr];
    const yrTotalCount = byYear[yr].reduce((s,mk)=>s+(isLoan?loansCreatedInMonth(mk).length:state.expenses.filter(e=>e.fecha.startsWith(mk)).length),0);

    // Header año (colapsable)
    const monthsContainer = document.createElement("div");
    monthsContainer.style.display = isOpen ? "flex" : "none";
    monthsContainer.style.flexDirection = "column";
    monthsContainer.style.gap = "6px";
    monthsContainer.style.marginBottom = isOpen ? "4px" : "0";

    const yrBtn = h("button",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",background:"none",border:"none",padding:"8px 4px",cursor:"pointer",borderRadius:"10px"}},
      h("div",{style:{display:"flex",alignItems:"center",gap:"8px"}},
        h("span",{style:{fontSize:"18px",fontWeight:"900",color:accent,fontFamily:"'Cormorant Garamond',serif"}},yr),
        h("span",{style:{fontSize:"11px",color:"#bbb",fontWeight:"600"}},yrTotalCount+" reg.")
      ),
      h("span",{style:{fontSize:"12px",color:accent,fontWeight:"800",transition:"transform .2s",display:"inline-block",transform:isOpen?"rotate(0deg)":"rotate(-90deg)"}},isOpen?"▾":"▾")
    );
    // Toggle al presionar año
    yrBtn.addEventListener("click", () => {
      const currently = monthsContainer.style.display !== "none";
      monthsContainer.style.display = currently ? "none" : "flex";
      yrBtn.querySelector("span:last-child").style.transform = currently ? "rotate(-90deg)" : "rotate(0deg)";
    });

    buttons.push(yrBtn);

    byYear[yr].forEach(mk => {
      const isSel = mk===selMK;
      const isCur = mk===curMK();
      const count = isLoan
        ? loansCreatedInMonth(mk).length
        : state.expenses.filter(e=>e.fecha.startsWith(mk)).length;
      const mo = new Date(Number(yr), Number(mk.slice(5,7))-1, 1).toLocaleDateString("es-CL",{month:"long"});

      const btn = h("button",{style:{background:isSel?`linear-gradient(135deg,${accent},${accentD})`:C.white,border:isSel?"none":"1.5px solid rgba(0,0,0,.07)",borderRadius:"14px",padding:"11px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer",boxShadow:isSel?`0 4px 14px ${accent}44`:"0 1px 3px rgba(0,0,0,.04)",width:"100%"},onclick:()=>onSelect(mk)},
        h("div",{style:{display:"flex",alignItems:"center",gap:"10px"}},
          h("span",{style:{fontSize:"15px"}},isCur?"✨":"📅"),
          h("div",{},
            h("p",{style:{margin:"0",fontSize:"15px",fontWeight:"700",fontFamily:"'Cormorant Garamond',serif",color:isSel?C.white:C.dark,textTransform:"capitalize"}},mo),
            h("p",{style:{margin:"2px 0 0",fontSize:"11px",color:isSel?"rgba(255,255,255,.6)":"#bbb",fontWeight:"600"}},count+" registro"+(count!==1?"s":""))
          )
        ),
        h("div",{style:{display:"flex",alignItems:"center",gap:"8px"}},
          ...(isCur?[h("span",{style:{fontSize:"10px",fontWeight:"800",background:isSel?"rgba(255,255,255,.25)":"rgba(0,0,0,.07)",color:isSel?C.white:"#999",borderRadius:"8px",padding:"2px 8px",letterSpacing:"0.5px"}},"HOY")]:[] ),
          ...(isSel?[h("span",{style:{color:C.white,fontSize:"18px"}},"✓")]:[] )
        )
      );
      monthsContainer.appendChild(btn);
    });

    buttons.push(monthsContainer);
  });

  const title = monthPickerFor==="loanVsA"?"Mes A — Préstamos"
    :monthPickerFor==="loanVsB"?"Mes B — Préstamos"
    :monthPickerFor==="expVsA"?"Mes A — Gastos"
    :monthPickerFor==="expVsB"?"Mes B — Gastos"
    :"Selecciona un mes";

  const pickerWrap = h("div",{style:{display:"flex",flexDirection:"column",gap:"4px"}});
  buttons.forEach(b => pickerWrap.appendChild(b));
  return renderSheet(title,()=>setState({monthPickerFor:null}), pickerWrap);
}


// ── Exportar / Importar ───────────────────────────────────────────────────────
function exportData() {
  const ahora = new Date();
  const fechaTexto = ahora.toLocaleDateString("es-CL",{day:"2-digit",month:"long",year:"numeric",hour:"2-digit",minute:"2-digit"});
  const nombreArchivo = "RioLuquitas_respaldo_" + ahora.toISOString().slice(0,10) + ".json";

  const datos = {
    "_info": {
      "app": "RioLuquitas",
      "descripcion": "Este archivo contiene todos tus datos de préstamos y gastos registrados en la app RioLuquitas. Guárdalo en un lugar seguro (iCloud, Google Drive, etc.) para hacer respaldo o transferir tus datos a otro dispositivo.",
      "exportadoEl": fechaTexto,
      "version": "2",
      "totales": {
        "prestamos": state.loans.length,
        "gastos": state.expenses.length
      },
      "instrucciones": {
        "como_importar": "Abre RioLuquitas → toca el botón 📤 en la parte superior → elige 'Importar datos' → selecciona este archivo. ATENCIÓN: importar reemplazará todos tus datos actuales.",
        "como_exportar": "Abre RioLuquitas → toca el botón 📤 en la parte superior → elige 'Exportar datos'. Se descargará un archivo como este.",
        "formato_fechas": "Las fechas están en formato AAAA-MM-DD (año-mes-día). pagadoEn es una marca de tiempo Unix en milisegundos."
      }
    },
    "prestamos": state.loans.map(l => ({
      "--- PRÉSTAMO ---": "Cada préstamo que registraste en la app aparece aquí como un bloque.",
      "id": l.id,
      "id_explicacion": "Identificador único interno. No lo modifiques si vas a reimportar.",
      "nombre": l.nombre,
      "nombre_explicacion": "Nombre de la persona a quien le prestaste.",
      "monto": l.monto,
      "monto_formato": fmtCLP(l.monto),
      "monto_explicacion": "Monto prestado en pesos chilenos (CLP). 'monto' es el número crudo, 'monto_formato' es solo para leer.",
      "fecha": l.fecha,
      "fecha_explicacion": "Fecha en que registraste el préstamo. Formato AAAA-MM-DD (ej: 2026-04-15 = 15 de abril 2026).",
      "nota": l.nota || "",
      "nota_explicacion": "Nota opcional que escribiste sobre el préstamo (ej: 'Para el arriendo'). Puede estar vacío.",
      "pagado": l.pagado,
      "pagado_explicacion": "true = el préstamo fue cobrado. false = sigue pendiente de cobro.",
      "pagadoEn": l.pagadoEn || null,
      "pagadoEn_explicacion": "Fecha y hora exacta en que marcaste el préstamo como cobrado. Es un número Unix (milisegundos desde 1970). null si está pendiente.",
      "pagadoEn_formato": l.pagadoEn ? fmtDateTime(l.pagadoEn) : "Pendiente de cobro",
      "pagadoEn_formato_explicacion": "La misma fecha de cobro pero en formato legible. Solo referencia visual."
    })),
    "gastos": state.expenses.map(e => ({
      "--- GASTO ---": "Cada gasto que registraste en la app aparece aquí como un bloque.",
      "id": e.id,
      "id_explicacion": "Identificador único interno. No lo modifiques si vas a reimportar.",
      "categoria": e.cat,
      "categoria_explicacion": "Código interno de la categoría. Los posibles valores son: comida, super, transporte, salud, ropa, entrete, hogar, personal, otros.",
      "categoria_nombre": catById(e.cat).label,
      "categoria_nombre_explicacion": "Nombre legible de la categoría (ej: 'Cuidado personal'). Solo referencia visual.",
      "monto": e.monto,
      "monto_formato": fmtCLP(e.monto),
      "monto_explicacion": "Monto gastado en pesos chilenos (CLP). 'monto' es el número crudo, 'monto_formato' es solo para leer.",
      "fecha": e.fecha,
      "fecha_explicacion": "Fecha del gasto. Formato AAAA-MM-DD (ej: 2026-05-03 = 3 de mayo 2026).",
      "descripcion": e.desc,
      "descripcion_explicacion": "Lo que escribiste para describir el gasto (ej: 'Uñas acrílicas', 'Entradas al cine')."
    }))
  };

  const json = JSON.stringify(datos, null, 2);
  const blob = new Blob([json], {type: "application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = nombreArchivo;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  setState({sheet: null});
  setTimeout(() => alert("✅ Datos exportados correctamente.\n\nArchivo: " + nombreArchivo + "\n\nGuárdalo en iCloud o Google Drive para tenerlo seguro."), 300);
}

function importData(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const datos = JSON.parse(ev.target.result);

      // Validar estructura básica
      if (!datos.prestamos || !datos.gastos || !Array.isArray(datos.prestamos) || !Array.isArray(datos.gastos)) {
        alert("❌ El archivo no es válido.\n\nAsegúrate de seleccionar un archivo exportado desde RioLuquitas.");
        return;
      }

      const totalP = datos.prestamos.length;
      const totalG = datos.gastos.length;

      const confirmar = confirm(
        "⚠️ ¿Importar estos datos?\n\n" +
        "• " + totalP + " préstamo" + (totalP!==1?"s":"") + "\n" +
        "• " + totalG + " gasto" + (totalG!==1?"s":"") + "\n\n" +
        "ATENCIÓN: Esto reemplazará todos tus datos actuales. Esta acción no se puede deshacer."
      );
      if (!confirmar) return;

      // Limpiar campos internos del export (_descripcion, campos _formato) y dejar solo los datos reales
      const loans = datos.prestamos.map(l => ({
        id:       l.id,
        nombre:   l.nombre,
        monto:    l.monto,
        fecha:    l.fecha,
        nota:     l.nota || "",
        pagado:   l.pagado,
        pagadoEn: l.pagadoEn || null
      }));

      const expenses = datos.gastos.map(e => ({
        id:    e.id,
        cat:   e.categoria,
        monto: e.monto,
        fecha: e.fecha,
        desc:  e.descripcion
      }));

      setState({loans, expenses, sheet: null});
      setTimeout(() => alert("✅ Datos importados correctamente.\n\n" + totalP + " préstamo" + (totalP!==1?"s":"") + " y " + totalG + " gasto" + (totalG!==1?"s":"") + " cargados."), 300);

    } catch(err) {
      alert("❌ Error al leer el archivo.\n\nAsegúrate de seleccionar un archivo JSON exportado desde RioLuquitas.\n\nDetalle: " + err.message);
    }
  };
  reader.readAsText(file);
}

// ── Sheet Exportar / Importar ─────────────────────────────────────────────────
function renderDataSheet() {
  const totalP = state.loans.length;
  const totalG = state.expenses.length;
  const pendientes = state.loans.filter(l=>!l.pagado).length;
  const totalGastado = state.expenses.reduce((s,e)=>s+e.monto,0);

  // Resumen rápido
  const resumen = h("div",{style:{background:`linear-gradient(135deg,${C.espresso},${C.caramel})`,borderRadius:"18px",padding:"18px 20px",marginBottom:"20px"}},
    h("p",{style:{margin:"0 0 12px",fontSize:"12px",fontWeight:"800",color:"rgba(255,255,255,.55)",letterSpacing:"1px"}},"TUS DATOS ACTUALES"),
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}},
      h("div",{style:{background:"rgba(255,255,255,.1)",borderRadius:"12px",padding:"10px 12px"}},
        h("p",{style:{margin:"0",fontSize:"22px",fontWeight:"800",color:C.white,fontFamily:"'Cormorant Garamond',serif"}}, String(totalP)),
        h("p",{style:{margin:"2px 0 0",fontSize:"10px",fontWeight:"700",color:"rgba(255,255,255,.5)",letterSpacing:"0.5px"}},"PRÉSTAMOS")
      ),
      h("div",{style:{background:"rgba(255,255,255,.1)",borderRadius:"12px",padding:"10px 12px"}},
        h("p",{style:{margin:"0",fontSize:"22px",fontWeight:"800",color:C.white,fontFamily:"'Cormorant Garamond',serif"}}, String(pendientes)),
        h("p",{style:{margin:"2px 0 0",fontSize:"10px",fontWeight:"700",color:"rgba(255,255,255,.5)",letterSpacing:"0.5px"}},"PENDIENTES")
      ),
      h("div",{style:{background:"rgba(255,255,255,.1)",borderRadius:"12px",padding:"10px 12px"}},
        h("p",{style:{margin:"0",fontSize:"22px",fontWeight:"800",color:C.white,fontFamily:"'Cormorant Garamond',serif"}}, String(totalG)),
        h("p",{style:{margin:"2px 0 0",fontSize:"10px",fontWeight:"700",color:"rgba(255,255,255,.5)",letterSpacing:"0.5px"}},"GASTOS")
      ),
      h("div",{style:{background:"rgba(255,255,255,.1)",borderRadius:"12px",padding:"10px 12px"}},
        h("p",{style:{margin:"0",fontSize:"15px",fontWeight:"800",color:C.white,fontFamily:"'Cormorant Garamond',serif"}}, fmtCLP(totalGastado)),
        h("p",{style:{margin:"2px 0 0",fontSize:"10px",fontWeight:"700",color:"rgba(255,255,255,.5)",letterSpacing:"0.5px"}},"TOTAL GASTADO")
      )
    )
  );

  // Botón exportar
  const exportBtn = h("div",{style:{marginBottom:"12px"}},
    h("p",{style:{margin:"0 0 6px",fontSize:"11px",fontWeight:"800",color:C.caramel,letterSpacing:"1px"}},"📤 EXPORTAR DATOS"),
    h("p",{style:{margin:"0 0 10px",fontSize:"13px",color:"#888",lineHeight:"1.5"}},"Descarga un archivo JSON con todos tus préstamos y gastos. Guárdalo en iCloud o Google Drive como respaldo."),
    h("button",{
      style:{width:"100%",border:"none",padding:"15px",borderRadius:"16px",fontSize:"15px",fontWeight:"800",fontFamily:"'Nunito',sans-serif",cursor:"pointer",background:`linear-gradient(135deg,${C.caramel},${C.espresso})`,color:C.white,display:"flex",alignItems:"center",justifyContent:"center",gap:"10px"},
      onclick: exportData
    },
      h("span",{style:{fontSize:"20px"}},"📤"),
      h("span",{},"Exportar mis datos")
    )
  );

  // Input file oculto para importar
  const fileInput = document.createElement("input");
  fileInput.type = "file"; fileInput.accept = ".json";
  fileInput.style.display = "none";
  fileInput.addEventListener("change", e => importData(e.target.files[0]));

  // Botón importar
  const importBtn = h("div",{style:{marginBottom:"12px"}},
    h("p",{style:{margin:"0 0 6px",fontSize:"11px",fontWeight:"800",color:C.sage,letterSpacing:"1px"}},"📥 IMPORTAR DATOS"),
    h("p",{style:{margin:"0 0 10px",fontSize:"13px",color:"#888",lineHeight:"1.5"}},"Carga un archivo exportado previamente desde RioLuquitas. Reemplazará todos los datos actuales."),
    h("button",{
      style:{width:"100%",border:"none",padding:"15px",borderRadius:"16px",fontSize:"15px",fontWeight:"800",fontFamily:"'Nunito',sans-serif",cursor:"pointer",background:`linear-gradient(135deg,${C.sage},${C.moss})`,color:C.white,display:"flex",alignItems:"center",justifyContent:"center",gap:"10px"},
      onclick: () => fileInput.click()
    },
      h("span",{style:{fontSize:"20px"}},"📥"),
      h("span",{},"Importar desde archivo")
    ),
    fileInput
  );

  // Advertencia
  const aviso = h("div",{style:{background:"rgba(192,57,43,.07)",borderRadius:"14px",padding:"12px 16px",border:"1px solid rgba(192,57,43,.15)"}},
    h("p",{style:{margin:"0",fontSize:"12px",color:C.red,fontWeight:"600",lineHeight:"1.6"}},"⚠️ Importar datos reemplaza permanentemente lo que tienes ahora. Se recomienda exportar antes de importar.")
  );

  const cancelBtn = h("button",{
    style:{width:"100%",border:"none",padding:"14px",borderRadius:"16px",marginTop:"10px",fontSize:"15px",fontWeight:"700",fontFamily:"'Nunito',sans-serif",cursor:"pointer",background:"rgba(0,0,0,.06)",color:C.dark},
    onclick:()=>setState({sheet:null})
  },"Cerrar");

  return renderSheet("Mis datos 📦", ()=>setState({sheet:null}), resumen, exportBtn, importBtn, aviso, cancelBtn);
}

// ── Tab bar ───────────────────────────────────────────────────────────────────
function renderTabBar() {
  const { tab } = state;
  const isLoanSide = LEFT_TABS.includes(tab);
  const fabBg = isLoanSide
    ? `linear-gradient(135deg,${C.caramel},${C.espresso})`
    : `linear-gradient(135deg,${C.sage},${C.moss})`;
  const fabAction = isLoanSide ? "loan" : "expense";

  const tabBtn = (id, label, icon) => {
    const on = tab===id;
    return h("button",{
      style:{flex:"1",background:"none",border:"none",padding:"6px 0 0",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:"3px"},
      onclick:()=>setState({tab:id})
    },
      h("span",{style:{fontSize:"20px"}},icon),
      h("span",{style:{fontSize:"9px",fontWeight:"800",color:on?C.caramel:"#bbb",letterSpacing:"0.4px"}},label.toUpperCase())
    );
  };

  return h("div",{style:{position:"fixed",bottom:"0",left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"430px",background:"rgba(247,239,229,0.96)",backdropFilter:"blur(24px)",borderTop:"1px solid rgba(122,69,34,.12)",display:"flex",alignItems:"flex-end",paddingBottom:"28px",paddingTop:"8px",zIndex:"50"}},
    tabBtn("prestamos","Préstamos","🏠"),
    tabBtn("resumenPrestamos","Resumen","💸"),
    h("div",{style:{flex:"1",display:"flex",justifyContent:"center",alignItems:"center",paddingBottom:"4px"}},
      h("button",{className:"pr",
        style:{width:"54px",height:"54px",borderRadius:"50%",border:"none",background:fabBg,color:C.white,fontSize:"26px",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 6px 20px rgba(44,24,16,.4)",cursor:"pointer",transform:"translateY(-10px)",transition:"background .35s"},
        onclick:()=>openSheet(fabAction)
      },"+")
    ),
    tabBtn("gastos","Gastos","💳"),
    tabBtn("resumenGastos","Resumen","📊")
  );
}

// ── Main render ───────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  // Preservar overlays activos (sheets abiertos) para no cortar animaciones
  const activeOverlays = Array.from(app.querySelectorAll('[data-overlay="1"]'));
  app.innerHTML = "";

  const isLoanSide = LEFT_TABS.includes(state.tab);
  const statusColor = isLoanSide ? C.espresso : C.moss;

  const root = h("div",{style:{width:"100%",maxWidth:"430px",minHeight:"100svh",background:C.cream,fontFamily:"'Nunito',sans-serif",position:"relative",overflowX:"hidden",margin:"0 auto",display:"flex",flexDirection:"column"}});
  app.appendChild(root);

  root.appendChild(h("div",{style:{height:"env(safe-area-inset-top,50px)",background:statusColor,flexShrink:"0",transition:"background .35s"}}));
  root.appendChild(isLoanSide ? renderLoanHeader() : renderExpenseHeader());

  const content = h("div",{style:{flex:"1",overflowY:"auto",paddingBottom:"112px"}});
  root.appendChild(content);

  if (state.tab==="prestamos")        content.appendChild(renderPrestamosTab());
  if (state.tab==="resumenPrestamos") content.appendChild(renderResumenPrestamos());
  if (state.tab==="gastos")           content.appendChild(renderGastosTab());
  if (state.tab==="resumenGastos")    content.appendChild(renderResumenGastos());

  root.appendChild(renderTabBar());

  if (state.sheet==="loan")    root.appendChild(renderLoanSheet());
  if (state.sheet==="expense") root.appendChild(renderExpenseSheet());
  if (state.sheet==="data")    root.appendChild(renderDataSheet());
  if (state.detailL)           root.appendChild(renderLoanDetailSheet());
  if (state.detailE)           root.appendChild(renderExpDetailSheet());
  if (state.monthPickerFor)    root.appendChild(renderMonthPickerSheet());
  // Re-adjuntar overlays que estaban animando (cierre en curso)
  activeOverlays.forEach(ov=>{ if(!ov.parentNode) app.appendChild(ov); });
}

render();
</script>
